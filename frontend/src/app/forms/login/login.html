<form [formGroup]="userRegister" (ngSubmit)="login()">

  <div class="mb-3">
    <label class="form-label">Email</label>
    <input
      type="text"
      class="form-control"
      placeholder="Enter Email"
      formControlName="email"
    />
  </div>

  <div class="mb-3">
    <label class="form-label">Password</label>
    <input
      type="password"
      class="form-control"
      placeholder="Enter Password"
      formControlName="password"
    />
  </div>

  <button class="btn btn-dark" [disabled]="userRegister.invalid">
    Submit
  </button>

</form>

<p class="mt-3">
  Don't have an account?
  <a routerLink="/signup">Sign up</a>
</p>
