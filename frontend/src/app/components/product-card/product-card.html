<div class="card" style="width: 18rem" appProductCardDirective>
  <h5
    [class.available]="product.stock > 1"
    [class.last-item]="product.stock == 1"
    [class.out-of-stock]="product.stock <= 0"
  >
    {{ product.stock > 1 ? 'Available' : product.stock > 0 ? 'Last Item' : 'Out of stock' }}
  </h5>
  <img
    [src]="product.images ? product.images[0] : null"
    class="card-img-top"
    alt="not exist"
    appCardImgDirective
  />
  <div class="card-body">
    <h5 class="card-title">{{ product.title }}</h5>
    <p class="card-text">
      {{ fullDesc ? product.description : (product.description | productDescSplitter) }}
      <button class="descExpand" (click)="flipDesc()">
        {{ !fullDesc ? '...' : '<' }}
      </button>
    </p>

    <h6 class="card-title">{{ product.price | currency }}</h6>

    <div class="buy">
      <app-mybtn
        text="Buy"
        (clicked)="buy(inp, product)"
        [btnColor]="!validQuantity(+inp.value, product.stock) ? 'gray' : ''"
      >
      </app-mybtn>
      <input
        [disabled]="product.stock == 0"
        class="quantityOrder"
        [placeholder]="product.stock <= 0 ? 'Not available' : 'Order quantity'"
        #inp
        type="number"
        min="1"
        (input)="validQuantity(+inp.value, product.stock)"
      />
    </div>
    <div style="color: red;">{{ err }}</div>
  </div>
</div>
