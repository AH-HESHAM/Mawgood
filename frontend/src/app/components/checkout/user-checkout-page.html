<div class="checkout-container">
  <div class="checkout-card">
    <div class="checkout-header">
      <h1>Checkout</h1>
      <p>Please confirm your shipping and payment information</p>
    </div>

    <form [formGroup]="checkoutForm" (ngSubmit)="onSubmit()" class="checkout-form">
      <!-- Shipping Section -->
      <section class="form-section">
        <h2 class="section-title"><i class="fas fa-shipping-fast"></i> Shipping Details</h2>
        
        <div class="form-group">
          <label for="recipientName">Recipient Name</label>
          <div class="input-container">
            <input 
              type="text" 
              id="recipientName" 
              formControlName="recipientName" 
              placeholder="Enter full name"
              [class.error]="checkoutForm.get('recipientName')?.invalid && checkoutForm.get('recipientName')?.touched"
            >
          </div>
          <div class="error-message" *ngIf="checkoutForm.get('recipientName')?.invalid && checkoutForm.get('recipientName')?.touched">
            Recipient name is required
          </div>
        </div>

        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <div class="input-container">
            <input 
              type="tel" 
              id="phoneNumber" 
              formControlName="phoneNumber" 
              placeholder="e.g. 0123456789"
              [class.error]="checkoutForm.get('phoneNumber')?.invalid && checkoutForm.get('phoneNumber')?.touched"
            >
          </div>
          <div class="error-message" *ngIf="checkoutForm.get('phoneNumber')?.invalid && checkoutForm.get('phoneNumber')?.touched">
            Please enter a valid phone number (10-15 digits)
          </div>
        </div>

        <div class="form-group">
          <label for="address">Delivery Address</label>
          <div class="input-container">
            <textarea 
              id="address" 
              formControlName="address" 
              placeholder="Enter your full street address"
              rows="3"
              [class.error]="checkoutForm.get('address')?.invalid && checkoutForm.get('address')?.touched"
            ></textarea>
          </div>
          <div class="error-message" *ngIf="checkoutForm.get('address')?.invalid && checkoutForm.get('address')?.touched">
            Delivery address is required
          </div>
        </div>
      </section>

      <!-- Payment Section -->
      <section class="form-section">
        <h2 class="section-title"><i class="fas fa-credit-card"></i> Payment Method</h2>
        
        <div class="payment-options">
          @if (isCustomer()) {
            <label class="payment-option">
              <input type="radio" name="paymentMethod" formControlName="paymentMethod" value="cash">
              <div class="option-content">
                <div class="option-icon"><i class="fas fa-money-bill-wave"></i></div>
                <div class="option-details">
                  <span class="option-name">Cash on Delivery</span>
                  <span class="option-desc">Pay when your order arrives</span>
                </div>
                <div class="radio-custom"></div>
              </div>
            </label>
          }

          <label class="payment-option">
            <input type="radio" name="paymentMethod" formControlName="paymentMethod" value="online">
            <div class="option-content">
              <div class="option-icon"><i class="fas fa-globe"></i></div>
              <div class="option-details">
                <span class="option-name">Online Payment</span>
                <span class="option-desc">Credit Card, Wallet, or Stripe</span>
              </div>
              <div class="radio-custom"></div>
            </div>
          </label>
        </div>
      </section>

      <div class="form-actions">
        <button type="submit" class="submit-btn" [disabled]="checkoutForm.invalid">
          <span>Complete Order</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </div>
    </form>
  </div>
</div>
