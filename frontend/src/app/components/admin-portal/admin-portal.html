<div class="usersList container mt-4">
  <table class="table table-striped table-bordered">
    <thead class="table-dark">
      <tr>
        <th>#</th>
        <th>Full Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Role</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      @for (user of usersList$ | async; track user._id; let indx = $index) {
        <tr>
          <td>{{ indx + 1 }}</td>
          <td>{{ user.fullName }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phoneNumber }}</td>
          <td>
            <span class="badge bg-primary">{{ user.role }}</span>
          </td>
          <td>
            <button 
              class="btn btn-danger btn-sm"
              (click)="deleteUser(user._id)">
              Delete
            </button>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
